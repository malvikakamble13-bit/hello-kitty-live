<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Full Body Hello Kitty</title>
    <style>
        :root {
            --kitty-white: #ffffff;
            --kitty-black: #222222;
            --kitty-pink: #ff94b8;
            --kitty-dark-pink: #e66b94;
            --kitty-yellow: #fcd116;
            --kitty-blue: #5bc0be;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: #ffeef2;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .container {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Character Wrapper */
        .kitty {
            position: relative;
            width: 260px;
            height: 340px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Ears */
        .ear {
            position: absolute;
            width: 70px;
            height: 70px;
            background-color: var(--kitty-white);
            border: 7px solid var(--kitty-black);
            border-radius: 15px;
            top: -10px;
            z-index: 1;
        }

        .ear.left {
            left: 10px;
            transform: rotate(-15deg);
            border-bottom-color: transparent;
            border-right-color: transparent;
        }

        .ear.right {
            right: 10px;
            transform: rotate(15deg);
            border-bottom-color: transparent;
            border-left-color: transparent;
        }

        /* Head */
        .head {
            position: relative;
            width: 250px;
            height: 190px;
            background-color: var(--kitty-white);
            border: 7px solid var(--kitty-black);
            border-radius: 50% 50% 45% 45% / 60% 60% 40% 40%;
            z-index: 3;
        }

        /* Interactive Eyes */
        .eye-container {
            position: absolute;
            top: 95px;
            width: 24px;
            height: 34px;
            background-color: transparent;
        }

        .eye-container.left { left: 55px; }
        .eye-container.right { right: 55px; }

        .pupil {
            position: absolute;
            width: 24px;
            height: 34px;
            background-color: var(--kitty-black);
            border-radius: 50%;
            top: 0;
            left: 0;
        }

        /* Nose */
        .nose {
            position: absolute;
            top: 118px;
            left: 50%;
            transform: translateX(-50%);
            width: 25px;
            height: 18px;
            background-color: var(--kitty-yellow);
            border: 6px solid var(--kitty-black);
            border-radius: 50%;
        }

        /* Whiskers */
        .whisker {
            position: absolute;
            width: 35px;
            height: 6px;
            background-color: var(--kitty-black);
            border-radius: 3px;
        }

        .whisker.l1 { left: -15px; top: 100px; transform: rotate(10deg); }
        .whisker.l2 { left: -20px; top: 118px; transform: rotate(0deg); }
        .whisker.l3 { left: -15px; top: 135px; transform: rotate(-10deg); }

        .whisker.r1 { right: -15px; top: 100px; transform: rotate(-10deg); }
        .whisker.r2 { right: -20px; top: 118px; transform: rotate(0deg); }
        .whisker.r3 { right: -15px; top: 135px; transform: rotate(10deg); }

        /* Bow */
        .bow {
            position: absolute;
            top: -5px;
            right: 25px;
            z-index: 4;
        }

        .bow-center {
            width: 30px;
            height: 30px;
            background-color: var(--kitty-pink);
            border: 6px solid var(--kitty-black);
            border-radius: 50%;
            position: relative;
            z-index: 5;
        }

        .bow-loop {
            position: absolute;
            width: 45px;
            height: 45px;
            background-color: var(--kitty-pink);
            border: 6px solid var(--kitty-black);
            border-radius: 50%;
            top: -12px;
        }

        .bow-loop.left { left: -32px; transform: rotate(-10deg); }
        .bow-loop.right { right: -32px; transform: rotate(10deg); }

        /* Full Body Overalls */
        .body-overalls {
            position: relative;
            width: 140px;
            height: 110px;
            background-color: var(--kitty-pink);
            border: 7px solid var(--kitty-black);
            border-radius: 40% 40% 30% 30%;
            margin-top: -25px;
            z-index: 2;
            overflow: hidden;
        }

        /* Yellow Shirt Underneath */
        .body-overalls::before {
            content: '';
            position: absolute;
            top: 0;
            left: 15px;
            width: 96px;
            height: 30px;
            background-color: var(--kitty-yellow);
            border-bottom: 6px solid var(--kitty-black);
            border-radius: 0 0 20px 20px;
        }

        /* Straps */
        .strap {
            position: absolute;
            width: 20px;
            height: 45px;
            background-color: var(--kitty-pink);
            border: 6px solid var(--kitty-black);
            top: -5px;
        }
        .strap.left { left: 20px; }
        .strap.right { right: 20px; }

        /* Arms */
        .arm {
            position: absolute;
            width: 40px;
            height: 70px;
            background-color: var(--kitty-white);
            border: 7px solid var(--kitty-black);
            border-radius: 20px;
            z-index: 1;
            top: 175px;
        }
        .arm.left {
            left: 35px;
            transform: rotate(25deg);
        }
        .arm.right {
            right: 35px;
            transform: rotate(-25deg);
        }

        /* Feet */
        .feet-container {
            display: flex;
            justify-content: space-between;
            width: 130px;
            margin-top: -15px;
            z-index: 1;
        }

        .foot {
            width: 55px;
            height: 35px;
            background-color: var(--kitty-white);
            border: 7px solid var(--kitty-black);
            border-radius: 40% 40% 30% 30% / 70% 70% 30% 30%;
        }

        .hint {
            margin-top: 30px;
            color: var(--kitty-dark-pink);
            font-weight: bold;
            font-size: 1.1rem;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="kitty">
            <div class="ear left"></div>
            <div class="ear right"></div>
            
            <div class="head">
                <div class="bow">
                    <div class="bow-loop left"></div>
                    <div class="bow-center"></div>
                    <div class="bow-loop right"></div>
                </div>

                <div class="eye-container left">
                    <div class="pupil" id="left-eye"></div>
                </div>
                <div class="eye-container right">
                    <div class="pupil" id="right-eye"></div>
                </div>

                <div class="nose"></div>

                <div class="whisker l1"></div>
                <div class="whisker l2"></div>
                <div class="whisker l3"></div>
                <div class="whisker r1"></div>
                <div class="whisker r2"></div>
                <div class="whisker r3"></div>
            </div>

            <div class="arm left"></div>
            <div class="arm right"></div>

            <div class="body-overalls">
                <div class="strap left"></div>
                <div class="strap right"></div>
            </div>

            <div class="feet-container">
                <div class="foot left"></div>
                <div class="foot right"></div>
            </div>
        </div>

        <div class="hint">Watch her follow your pointer! 🐾</div>
    </div>

    <script>
        const leftEye = document.getElementById('left-eye');
        const rightEye = document.getElementById('right-eye');

        document.addEventListener('mousemove', (e) => {
            trackMouse(e, leftEye);
            trackMouse(e, rightEye);
        });

        function trackMouse(event, eyeElement) {
            const rect = eyeElement.parentElement.getBoundingClientRect();
            const eyeX = rect.left + rect.width / 2;
            const eyeY = rect.top + rect.height / 2;
            
            const angle = Math.atan2(event.clientY - eyeY, event.clientX - eyeX);
            const maxDistance = 6; 
            
            const moveX = Math.cos(angle) * maxDistance;
            const moveY = Math.sin(angle) * maxDistance;
            
            eyeElement.style.transform = `translate(${moveX}px, ${moveY}px)`;
        }
    </script>
</body>
</html>
